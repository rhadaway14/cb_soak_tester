name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh

  python:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Byte-compile the package
        run: python -m compileall -q soaktester
      - name: Import + config smoke test
        run: |
          python -c "import soaktester.cli, soaktester.runner, soaktester.client, soaktester.report, soaktester.seed, soaktester.metrics"
          python -c "from soaktester.config import load_config; c = load_config('config.example.yaml'); assert c.workload.duration_s == 3600; assert set(c.workload.mix) == {'kv_get', 'kv_upsert', 'query'}; print('config ok')"
      - name: Validate Grafana dashboard JSON
        run: python -c "import json; json.load(open('deploy/grafana/dashboards/couchbase-soak.json')); print('dashboard ok')"
