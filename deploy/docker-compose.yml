# Observability stack for the soak tester.
#
# Prometheus scrapes the tester's /metrics endpoint (default :9099) and Grafana
# renders the bundled dashboard. Run this on the same EC2 host as the tester:
#
#   docker compose up -d
#
# By default Prometheus scrapes host.docker.internal:9099 (the tester running on
# the host). host.docker.internal resolves on Linux EC2 via the extra_hosts
# entry below. To scrape a tester on a different host, edit the target in
# prometheus/prometheus.yml.
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: soak-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: soak-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
