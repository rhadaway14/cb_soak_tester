global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "cb-soak-tester"
    static_configs:
      # The tester exposes /metrics on :9099.
      #   * Tester on the SAME host as this stack -> host.docker.internal:9099
      #   * Tester on ANOTHER host -> replace with that host's IP, e.g.
      #     - targets: ["10.0.0.42:9099"]
      - targets:
          - "host.docker.internal:9099"
